# 실제 배포 시 이 파일을 복사해 secret.yaml을 만들고 값을 채운 뒤 적용하세요.
# secret.yaml은 커밋하지 않습니다.
#
#   kubectl apply -f secret.yaml
apiVersion: v1
kind: Secret
metadata:
  name: mysql-secret
  namespace: myapp
type: Opaque
stringData:
  mysql-root-password: <MYSQL_ROOT_PASSWORD>
  mysql-user: <MYSQL_USER>
  mysql-password: <MYSQL_PASSWORD>
---
apiVersion: v1
kind: Secret
metadata:
  name: app-secret
  namespace: myapp
type: Opaque
stringData:
  jwt-secret: <JWT_SECRET>
  naver-client-id: <NAVER_CLIENT_ID>
  naver-client-secret: <NAVER_CLIENT_SECRET>
  javascript-appkey: <KAKAO_JAVASCRIPT_APPKEY>
