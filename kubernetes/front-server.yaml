apiVersion: apps/v1
kind: Deployment 
metadata: 
  name: frontend-server
  namespace: myapp
spec: 
  selector: 
    matchLabels: 
      app: frontend 
  replicas: 1
  template: 
    metadata: 
      labels: 
        app: frontend  
    spec: 
      containers: 
        - name: frontend 
          image: esjwoo/mini-front:latest
          ports: 
            - containerPort: 443
          env:
            - name: NODE_ENV
              value: "production"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: jwt-secret
            - name: PORT
              value: "443"
            - name: BACKEND_HOST
              value: "backend-service"
            - name: BACKEND_PORT
              value: "8000"
            - name: CHATBOT_HOST
              value: "backend-service"
            - name: CHATBOT_PORT
              value: "8000"
            - name: CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: naver-client-id
            - name: CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: naver-client-secret
            - name: REDIRECT_URI
              value: "https://<SERVICE_HOST>:30001/naverlogin/login"
            - name: JAVASCRIPT_APPKEY
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: javascript-appkey
--- 
apiVersion: v1 
kind: Service 
metadata: 
  name: frontend-service
  namespace: myapp
spec:
  type: NodePort
  selector:
    app: frontend
  ports:
    - protocol: TCP
      port: 9443
      targetPort: 443
      nodePort: 30001
